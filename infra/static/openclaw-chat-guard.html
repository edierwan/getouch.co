<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw – Bootstrapping…</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: system-ui, -apple-system, sans-serif;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <span>Preparing OpenClaw…</span>
  <script>
    (function () {
      var TOKEN = '6da00bc730e0fa8717db992c3327a671b9d22186143c70b9';
      var rootTokenKey = 'openclaw.control.token.v1:wss://openclaw.getouch.co';
      var chatTokenKey = 'openclaw.control.token.v1:wss://openclaw.getouch.co/chat';
      var hasToken = false;

      try {
        hasToken = !!(
          localStorage.getItem(rootTokenKey) ||
          localStorage.getItem(chatTokenKey)
        );
      } catch (_) {}

      document.cookie = 'openclaw_boot=1; Max-Age=15; Path=/; SameSite=Lax';

      if (window.location.hash.indexOf('token=') !== -1) {
        console.log('[openclaw-guard] token hash already present; reloading into upstream app');
        window.location.reload();
        return;
      }

      if (hasToken) {
        console.log('[openclaw-guard] stored token present; reloading into upstream app');
        window.location.reload();
        return;
      }

      console.log('[openclaw-guard] no stored token; bootstrapping with hash token');
      window.location.hash = 'token=' + TOKEN;
      window.location.reload();
    })();
  </script>
</body>
</html>
