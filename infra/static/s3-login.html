<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Storage — Getouch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1b1f23;
            color: #e1e4e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #2d3239;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #adb5bd;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 0.3rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #444c56;
            border-radius: 4px;
            background: #161b22;
            color: #e1e4e8;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #58a6ff;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background: #6b8fa3;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #7da3b5; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            background: #dc3545;
            color: #fff;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>S3 Storage</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <label for="access_key_id">Access Key ID</label>
            <input type="text" id="access_key_id" name="access_key_id" required autocomplete="off">
            <label for="secret_access_key">Secret Access Key</label>
            <input type="password" id="secret_access_key" name="secret_access_key" required>
            <button type="submit" id="btn">CONNECT</button>
        </form>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            const errEl = document.getElementById("error");
            errEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Connecting...";
            try {
                const res = await fetch("/api/session", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        type: "s3",
                        access_key_id: document.getElementById("access_key_id").value,
                        secret_access_key: document.getElementById("secret_access_key").value,
                        endpoint: "http://seaweed-s3:8333",
                        region: "us-east-1",
                        path: "/"
                    })
                });
                const data = await res.json();
                if (data.status === "ok" && data.result && data.result.is_authenticated) {
                    window.location.href = "/files/";
                } else {
                    throw new Error(data.message || "Authentication failed");
                }
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "CONNECT";
            }
        });
    </script>
</body>
</html>
