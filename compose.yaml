services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - web
      - wa
      - pgadmin
      - open-webui
      - searxng
      - grafana
      - umami
    environment:
      ADMIN_AUTH_USER: ${ADMIN_AUTH_USER:-getouchadmin}
      ADMIN_AUTH_HASH: ${ADMIN_AUTH_HASH}
    ports:
      - 127.0.0.1:80:80
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header='Host: getouch.co' http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/static:/etc/caddy/static:ro
      - /data/getouch/caddy/data:/data
      - /data/getouch/caddy/config:/config
    networks:
      - edge
      - coolify

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: getouch-web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  wa:
    build:
      context: ./services/wa
      dockerfile: Dockerfile
    container_name: getouch-wa
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${WA_PORT:-3001}
      WA_API_KEY: ${WA_API_KEY}
      WA_AUTH_DIR: /app/data/auth
      WA_ADMIN_KEY: ${WA_ADMIN_KEY:-}
      DATABASE_URL: postgresql://${APP_DB_USER:-getouch}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME:-getouch}
      LOG_LEVEL: ${WA_LOG_LEVEL:-info}
    volumes:
      - /data/getouch/wa:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WA_PORT:-3001}/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  postgres:
    image: postgres:16-alpine
    container_name: getouch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-getouch}
      POSTGRES_USER: ${APP_DB_USER:-getouch}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - /data/getouch/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-getouch} -d ${APP_DB_NAME:-getouch}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edge
      - coolify

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: getouch-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_ENABLE_SERVER_PASS_EXEC_CMD: "True"
      PGADMIN_LISTEN_PORT: "80"
    volumes:
      - /data/getouch/pgadmin:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/misc/ping | grep -q PING || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - /srv/apps/ai/ollama:/root/.ollama
      - /srv/apps/ai/models:/models
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edge

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql://${APP_DB_USER:-getouch}:${APP_DB_PASSWORD}@postgres:5432/open_webui
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-changeme-in-production}
      WEBUI_NAME: Getouch Chat
      ENABLE_SIGNUP: "true"
      ENABLE_IMAGE_GENERATION: "false"

      # ── RAG Web Search via SearXNG ──
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      RAG_WEB_SEARCH_RESULT_COUNT: "5"
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: "5"

      # ── RAG Embeddings ──
      RAG_EMBEDDING_ENGINE: "ollama"
      RAG_EMBEDDING_MODEL: "nomic-embed-text:latest"
      RAG_OLLAMA_BASE_URL: http://ollama:11434
      RAG_CHUNK_SIZE: "1000"
      RAG_CHUNK_OVERLAP: "200"
      RAG_PDF_EXTRACT_IMAGES: "true"

      # ── Pipelines connection ──
      OPENAI_API_BASE_URLS: "http://pipelines:9099;https://api.openai.com/v1"
      OPENAI_API_KEYS: "0p3n-w3bu!;${OPENAI_API_KEY:-sk-placeholder}"

      # ── Features ──
      ENABLE_ADMIN_EXPORT: "true"
      ENABLE_COMMUNITY_SHARING: "true"
      DEFAULT_MODELS: "getouch-smart-assistant"
    command:
      - bash
      - -c
      - |
        if [ -f /app/build/index.html ] && ! grep -q 'getouch-custom-css' /app/build/index.html; then
          sed -i 's|</head>|<style id="getouch-custom-css">.assistant-message-profile-image{width:1.5rem!important;height:1.5rem!important}[id=response-message-model-name]{display:none!important}form img[src^="data:image"],form img[src*="/api/v1/files/"],form img[src*="/api/v1/attachments/"]{max-width:min(50vw,420px)!important;max-height:240px!important;width:auto!important;height:auto!important;object-fit:contain!important;border-radius:12px!important;border:1px solid rgba(255,255,255,.12)!important}form [class*="attachment"],form [class*="upload"],form [class*="image"]{min-height:88px}form [class*="attachment"]:has(img),form [class*="upload"]:has(img){display:flex!important;align-items:flex-start!important;gap:8px!important;flex-wrap:wrap!important}.prose table:has(th img){border:none!important;display:block!important;overflow-x:auto!important;width:100%!important;scrollbar-width:thin!important;padding:8px 0 4px!important}.prose table:has(th img) thead,.prose table:has(th img) tbody{display:contents!important}.prose table:has(th img) tr{display:flex!important;gap:16px!important}.prose table:has(th img) th,.prose table:has(th img) td{border:none!important;padding:0!important;flex:0 0 200px!important;width:200px!important;min-width:200px!important;max-width:200px!important;background:transparent!important;box-sizing:border-box!important}.prose table:has(th img) th{height:150px!important;min-height:150px!important;max-height:150px!important;position:relative!important;overflow:hidden!important;border-radius:14px!important;background:#1a1a2e!important;cursor:pointer!important;transition:box-shadow .3s ease!important}.prose table:has(th img) th:hover{box-shadow:0 4px 20px rgba(255,255,255,.1)!important}.prose table:has(th img) th img{position:absolute!important;top:0!important;left:0!important;display:block!important;width:100%!important;height:100%!important;max-width:none!important;max-height:none!important;object-fit:cover!important;border-radius:0!important;margin:0!important;transition:transform .3s ease!important}.prose table:has(th img) th:hover img{transform:scale(1.05)!important}.prose table:has(th img) td{display:-webkit-box!important;-webkit-line-clamp:2!important;-webkit-box-orient:vertical!important;overflow:hidden!important;font-size:13px!important;font-weight:600!important;line-height:1.3!important;min-height:48px!important;padding-top:8px!important;color:#e0e0e0!important;text-align:center!important}pre:has(code.language-getouch-sources){display:none!important;height:0!important;overflow:hidden!important;margin:0!important;padding:0!important}blockquote:has(a[href="#getouch-sources"]){border:none!important;padding:0!important;margin:4px 0 12px!important;background:transparent!important}blockquote:has(a[href="#getouch-sources"]) p{margin:0!important}blockquote:has(a[href="#getouch-sources"]) a{display:inline-flex!important;align-items:center!important;gap:6px!important;padding:6px 14px!important;border-radius:20px!important;background:rgba(255,255,255,.08)!important;color:#a0c4ff!important;font-size:13px!important;font-weight:500!important;text-decoration:none!important;cursor:pointer!important;transition:background .2s!important;border:1px solid rgba(255,255,255,.12)!important}blockquote:has(a[href="#getouch-sources"]) a:hover{background:rgba(255,255,255,.14)!important}.gtch-sd-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}.gtch-sd-ov.open{opacity:1;pointer-events:auto}.gtch-sd{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100vh;background:#1e1e2e;border-left:1px solid rgba(255,255,255,.1);z-index:9999;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.4)}.gtch-sd.open{transform:translateX(0)}.gtch-sd-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;background:#1e1e2e;z-index:1}.gtch-sd-h b{font-size:15px;color:#e0e0e0}.gtch-sd-x{background:none;border:none;color:#999;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}.gtch-sd-x:hover{background:rgba(255,255,255,.1);color:#fff}.gtch-si{border-bottom:1px solid rgba(255,255,255,.06)}.gtch-si a{display:flex;gap:12px;padding:14px 20px;text-decoration:none;color:inherit;align-items:flex-start}.gtch-si:hover{background:rgba(255,255,255,.04)}.gtch-sn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(160,196,255,.15);color:#a0c4ff;font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}.gtch-st{font-size:14px;font-weight:500;color:#e0e0e0;line-height:1.4;margin-bottom:3px}.gtch-sm{font-size:12px;color:#888;margin-bottom:5px}.gtch-ss{font-size:12px;color:#aaa;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}@media(max-width:640px){.gtch-sd{width:100vw;max-width:100vw}}</style></head>|' /app/build/index.html
        fi
        if [ -f /app/build/index.html ] && ! grep -q 'getouch-custom-js' /app/build/index.html; then
          cat > /tmp/getouch-drawer.html << 'ENDSCRIPT'
        <script id="getouch-custom-js">
        (function(){
          var d,o;
          function C(){if(d)d.classList.remove('open');if(o)o.classList.remove('open')}
          function O(s){
            if(!d){
              o=document.createElement('div');o.className='gtch-sd-ov';o.onclick=C;document.body.appendChild(o);
              d=document.createElement('div');d.className='gtch-sd';
              var hd=document.createElement('div');hd.className='gtch-sd-h';
              var hb=document.createElement('b');hb.textContent='Search results';
              var hx=document.createElement('button');hx.className='gtch-sd-x';hx.textContent='\u00d7';hx.onclick=C;
              hd.appendChild(hb);hd.appendChild(hx);d.appendChild(hd);
              var bd=document.createElement('div');bd.className='gtch-sd-b';d.appendChild(bd);
              document.body.appendChild(d);
              document.addEventListener('keydown',function(e){if(e.key==='Escape')C()});
            }
            var b=d.querySelector('.gtch-sd-b');b.innerHTML='';
            s.forEach(function(x,i){
              var v=document.createElement('div');v.className='gtch-si';
              var a=document.createElement('a');
              var h=String(x.url||'');
              if(/^https?:\/\//i.test(h))a.href=h;else a.href='#';
              a.target='_blank';a.rel='noopener noreferrer';
              var sn=document.createElement('span');sn.className='gtch-sn';sn.textContent=String(i+1);a.appendChild(sn);
              var dv=document.createElement('div');
              var tt=document.createElement('div');tt.className='gtch-st';tt.textContent=x.title||x.domain||'Source';dv.appendChild(tt);
              var dm=document.createElement('div');dm.className='gtch-sm';dm.textContent=x.domain||'';dv.appendChild(dm);
              if(x.snippet){var sp=document.createElement('div');sp.className='gtch-ss';sp.textContent=x.snippet;dv.appendChild(sp)}
              a.appendChild(dv);v.appendChild(a);b.appendChild(v);
            });
            requestAnimationFrame(function(){d.classList.add('open');o.classList.add('open')});
          }
          function P(){
            document.querySelectorAll('code.language-getouch-sources').forEach(function(c){
              var p=c.closest('pre');if(p)p.style.display='none';
              try{
                var S=JSON.parse(c.textContent);if(!Array.isArray(S))return;
                var msg=c.closest('.prose');if(!msg&&c.parentElement)msg=c.parentElement.parentElement;if(!msg)return;
                msg.querySelectorAll('a[href="#getouch-sources"]').forEach(function(a){
                  if(a.dataset.b)return;a.dataset.b='1';
                  a.addEventListener('click',function(e){e.preventDefault();O(S)});
                });
              }catch(e){}
            });
          }
          new MutationObserver(function(){P()}).observe(document.body,{childList:true,subtree:true});
          setTimeout(P,800);
        })();
        </script>
        ENDSCRIPT
          sed -i '/<\/body>/r /tmp/getouch-drawer.html' /app/build/index.html
        fi
        exec bash start.sh
    volumes:
      - /srv/apps/ai/open-webui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edge

  # ────────────────────────────────────────────────────────
  # SearXNG — privacy-respecting meta search engine
  # ────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-production}
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./infra/searxng/uwsgi.ini:/etc/searxng/uwsgi.ini:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  # ────────────────────────────────────────────────────────
  # Open WebUI Pipelines — extensible AI middleware
  # ────────────────────────────────────────────────────────
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: open-webui-pipelines
    restart: unless-stopped
    environment:
      PIPELINES_API_KEY: "0p3n-w3bu!"
    volumes:
      - /srv/apps/ai/pipelines:/app/pipelines
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:9099/v1/models', headers={'Authorization':'Bearer 0p3n-w3bu!'}))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - edge

  # ────────────────────────────────────────────────────────
  # SeaweedFS (S3-compatible storage)
  # Master, Volume, Filer and S3 gateway
  # Single-node setup (suitable for development / small deployments)
  # For production consider running multiple volume nodes and masters.
  # ────────────────────────────────────────────────────────
  seaweed-master:
    image: chrislusf/seaweedfs:latest
    container_name: seaweed-master
    restart: unless-stopped
    command: master -port=9333 -mdir=/data -defaultReplication=000
    volumes:
      - /srv/archive/seaweedfs/master:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  seaweed-volume:
    image: chrislusf/seaweedfs:latest
    container_name: seaweed-volume
    restart: unless-stopped
    depends_on:
      seaweed-master:
        condition: service_healthy
    command: volume -port=8080 -ip.bind=0.0.0.0 -dir=/data -max=10 -mserver=seaweed-master:9333 -dataCenter=dc1
    volumes:
      - /srv/archive/seaweedfs/volume:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  seaweed-filer:
    image: chrislusf/seaweedfs:latest
    container_name: seaweed-filer
    restart: unless-stopped
    depends_on:
      seaweed-master:
        condition: service_healthy
      seaweed-volume:
        condition: service_healthy
    command: filer -master=seaweed-master:9333 -port=8888 -ip.bind=0.0.0.0
    volumes:
      - /srv/archive/seaweedfs/filer:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  seaweed-s3:
    image: chrislusf/seaweedfs:latest
    container_name: seaweed-s3
    restart: unless-stopped
    depends_on:
      seaweed-filer:
        condition: service_healthy
    command: s3 -filer=seaweed-filer:8888 -port=8333 -ip.bind=0.0.0.0 -config=/etc/seaweedfs/s3.json
    volumes:
      - ./infra/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qS --spider http://127.0.0.1:8333/ 2>&1 | grep -q '403\\|200' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  filestash:
    image: machines/filestash:latest
    container_name: filestash
    restart: unless-stopped
    environment:
      APPLICATION_URL: s3.getouch.co
    ports: []
    volumes:
      - /data/getouch/filestash:/app/data/state
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8334/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  # ────────────────────────────────────────────────────────
  # Grafana — Metrics & observability dashboard
  # ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SERVER_ROOT_URL: https://grafana.getouch.co
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-getouch2026}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: ${APP_DB_USER:-getouch}
      GF_DATABASE_PASSWORD: ${APP_DB_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /data/getouch/grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  # ────────────────────────────────────────────────────────
  # Umami — Self-hosted web analytics
  # ────────────────────────────────────────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${APP_DB_USER:-getouch}:${APP_DB_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-getouch-umami-secret-2026}
      TRACKER_SCRIPT_NAME: gtag.js
      COLLECT_API_ENDPOINT: /api/collect
      DISABLE_TELEMETRY: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

networks:
  edge:
    name: getouch-edge
    driver: bridge
  coolify:
    external: true